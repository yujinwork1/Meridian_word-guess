  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;

.casino-time-label{font-size:10px;color:#4a6080;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}

  font-size:clamp(28px,8vw,38px);

.casino-name{

.casino-name:focus{border-color:#ffd700}
.casino-name::placeholder{color:#4a6080}

.casino-close{

  border-radius:8px;padding:11px;cursor:pointer;transition:all .18s;
}
.casino-close:hover{background:#1e3a5f}

.wg-confetti{position:fixed;top:-20px;pointer-events:none;z-index:9999;animation:casinoFall linear forwards}

function getWeekKey(){
  // MDT (America/Edmonton) - reset every Thursday 8:00 AM
  var now=new Date();
  var mdt=new Date(now.toLocaleString('en-US',{timeZone:'America/Edmonton'}));
  var day=mdt.getDay(); // 0=Sun, 4=Thu
  var thu=new Date(mdt);
  thu.setDate(mdt.getDate()-((day+3)%7)); // most recent Thursday
  if(day===4&&mdt.getHours()<8) thu.setDate(thu.getDate()-7); // Thu before 8am = prev week
  return 'wg_week_'+thu.getFullYear()+'_'+(thu.getMonth()+1)+'_'+thu.getDate();
}

// ── HELPERS ──
function $(id){return document.getElementById(id)}
function ft(s){var m=Math.floor(s/60),ss=s%60;return(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss}
function esc(x){return String(x).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
function fd(ts){
  if(!ts)return'-';
  var d=new Date(Number(ts));
  if(isNaN(d.getTime()))return'-';
  var mo=d.getMonth()+1,dd=d.getDate(),yy=String(d.getFullYear()).slice(2);
  var hh=d.getHours(),mm=d.getMinutes();
  return mo+'/'+dd+'/'+yy+' '+(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}
function dateStr(){
  // Show the current week's Thursday date (MDT)
  var now=new Date();
  var mdt=new Date(now.toLocaleString('en-US',{timeZone:'America/Edmonton'}));
  var day=mdt.getDay();
  var thu=new Date(mdt);
  thu.setDate(mdt.getDate()-((day+3)%7));
  if(day===4&&mdt.getHours()<8) thu.setDate(thu.getDate()-7);
  var D=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return D[thu.getDay()]+', '+M[thu.getMonth()]+' '+thu.getDate()+', '+thu.getFullYear();
}

// ── SIZING ──
function tileSz(){
  var vw=Math.min(window.innerWidth,460);
  return Math.min(Math.max(Math.floor((vw-28-(G.wordLen-1)*6)/G.wordLen),44),68);
}
function keySz(){
  var h=Math.min(Math.max(Math.floor(window.innerHeight*0.064),40),52);
  return{h:h,fs:Math.round(h*0.28)};
}
function applySize(){
  var sz=tileSz(),ks=keySz();
  document.querySelectorAll('.wg-tile').forEach(function(t){t.style.width=sz+'px';t.style.height=sz+'px';t.style.fontSize=Math.round(sz*0.42)+'px';});
  document.querySelectorAll('.wg-key').forEach(function(k){k.style.height=ks.h+'px';k.style.fontSize=ks.fs+'px';});
}
window.addEventListener('resize',applySize);

// ── BUILD GRID ──
function buildGrid(){
  var el=$('wgGrid');if(!el)return;
  el.innerHTML='';
  var sz=tileSz();
  for(var r=0;r<G.maxGuesses;r++){
    var row=document.createElement('div');row.className='wg-row';row.id='wgR'+r;
    for(var c=0;c<G.wordLen;c++){
      var t=document.createElement('div');t.className='wg-tile';t.id='wgT'+r+'_'+c;
      t.style.width=sz+'px';t.style.height=sz+'px';t.style.fontSize=Math.round(sz*0.42)+'px';
      row.appendChild(t);
    }
    el.appendChild(row);
  }
}

// ── BUILD KEYBOARD ──
function buildKB(){
  var kb=$('wgKeyboard');if(!kb)return;
  kb.innerHTML='';
  var ks=keySz();
  [['Q','W','E','R','T','Y','U','I','O','P'],
   ['A','S','D','F','G','H','J','K','L'],

        // Clear SVG backspace icon — bigger, simpler, mobile-friendly
        b.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
        b.style.display='flex';b.style.alignItems='center';b.style.justifyContent='center';

// ── RENDER ──
function renderGrid(){
  for(var r=0;r<G.maxGuesses;r++){
    for(var c=0;c<G.wordLen;c++){
      var t=$('wgT'+r+'_'+c);if(!t)continue;
      t.className='wg-tile';
      var sz=tileSz();t.style.width=sz+'px';t.style.height=sz+'px';t.style.fontSize=Math.round(sz*0.42)+'px';
      if(r<G.guesses.length){
        t.textContent=(G.guesses[r][c]||'').toUpperCase();
        t.classList.add(G.results[r]?G.results[r][c]:'absent');
      } else if(r===G.guesses.length&&!G.finished){
        var l=(G.currentInput[c]||'').toUpperCase();t.textContent=l;if(l)t.classList.add('tbd');
      } else t.textContent='';
    }
  }
  var gc=$('wgGC');if(gc)gc.textContent=G.guesses.length+' / 6';
  var hl=$('wgHL');if(hl)hl.textContent=G.hintsLeft;
  var hc=$('wgHC');if(hc)hc.textContent=G.hintsLeft;
  renderHint();
}

// ── GUESS RESULT ──
function guessResult(g){
  var ans=G.word.toUpperCase().split(''),guess=g.toUpperCase().split('');
  var res=Array(G.wordLen).fill('absent'),pool={};
  for(var i=0;i<G.wordLen;i++) if(guess[i]===ans[i]){res[i]='correct';}else{pool[ans[i]]=(pool[ans[i]]||0)+1;}
  for(var i=0;i<G.wordLen;i++){
    if(res[i]==='correct')continue;
    if(pool[guess[i]]&&pool[guess[i]]>0){res[i]='present';pool[guess[i]]--;}
  }
  return res;
}

// ── HINT RENDER ──
function renderHint(){
  var el=$('wgHintTiles');if(!el)return;
  el.innerHTML='';
  for(var i=0;i<G.wordLen;i++){
    var t=document.createElement('div');t.className='wg-htile';
    if(G.hintsUsed.indexOf(i)!==-1){t.textContent=G.word[i];t.classList.add('rev');}else t.textContent='_';
    el.appendChild(t);
  }
}

// ── KEY COLORS ──
function updateKeys(){
  G.keyStates={};
  var p={correct:3,present:2,absent:1};
  G.guesses.forEach(function(guess,ri){
    var result=G.results[ri];if(!result)return;
    for(var i=0;i<guess.length;i++){
      var l=guess[i].toUpperCase(),st=result[i],cur=G.keyStates[l];
      if(!cur||p[st]>p[cur])G.keyStates[l]=st;
    }
  });
  var ks=keySz();
  document.querySelectorAll('.wg-key').forEach(function(b){
    var k=b.dataset.key;
    b.className='wg-key'+((k==='ENTER'||k==='⌫')?' wide':'');
    if(G.keyStates[k])b.classList.add(G.keyStates[k]);
    b.style.height=ks.h+'px';b.style.fontSize=ks.fs+'px';
  });
}

// ── FLIP ──
function flipRow(ri,g,res,cb){
  var HALF=200,FULL=200,DELAY=300;
  for(var c=0;c<G.wordLen;c++){
    (function(col){
      var t=$('wgT'+ri+'_'+col);if(!t)return;
      setTimeout(function(){
        t.style.transition='transform '+HALF+'ms ease-in';t.style.transform='scaleY(0)';
        setTimeout(function(){
          var sz=tileSz();
          t.className='wg-tile '+res[col];t.textContent=g[col].toUpperCase();
          t.style.width=sz+'px';t.style.height=sz+'px';t.style.fontSize=Math.round(sz*0.42)+'px';
          t.style.transition='transform '+FULL+'ms ease-out';t.style.transform='scaleY(1)';
          setTimeout(function(){t.style.transition='';},FULL+10);
        },HALF);
      },col*DELAY);
    })(c);
  }
  setTimeout(cb,(G.wordLen-1)*DELAY+HALF+FULL+60);
}
function bounceRow(ri){
  for(var c=0;c<G.wordLen;c++){
    (function(col){setTimeout(function(){
      var t=$('wgT'+ri+'_'+col);if(!t)return;
      t.classList.add('bounce');setTimeout(function(){t.classList.remove('bounce');},750);
    },col*75);})(c);
  }
}
function shakeRow(ri){
  var r=$('wgR'+ri);if(!r)return;
  r.querySelectorAll('.wg-tile').forEach(function(t){
    t.style.animation='wgShk .42s ease';
    setTimeout(function(){t.style.animation='';},460);
  });
}

// ── TOAST ──
function toast(msg,dur){
  dur=dur||1700;
  var tw=$('wgTW');
  var t=document.createElement('div');t.className='wg-toast';t.textContent=msg;tw.appendChild(t);
  requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('show');});});
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},300);},dur);
}
function showMsg(txt,type){var m=$('wgMsg');m.innerHTML=txt;m.className='wg-msg '+type;}

// ── HANDLE KEY ──
function handleKey(k){
  if(G.finished||G.isProcessing)return;
  if(k==='⌫'||k==='Backspace'){
    if(G.currentInput.length>0){G.currentInput=G.currentInput.slice(0,-1);renderGrid();}
  } else if(k==='ENTER'||k==='Enter'){
    submitGuess();
  } else if(/^[A-Za-z]$/.test(k)&&G.currentInput.length<G.wordLen){
    var col=G.currentInput.length;G.currentInput+=k.toUpperCase();
    var t=$('wgT'+G.guesses.length+'_'+col);
    if(t){t.style.animation='wgPop .09s ease-out';setTimeout(function(){t.style.animation='';},100);}
    renderGrid();
  }
}
window.wgHandleKey=handleKey;

// ── SUBMIT ──
function submitGuess(){
  var g=G.currentInput.toUpperCase(),ri=G.guesses.length;
  if(g.length<G.wordLen){shakeRow(ri);toast('Not enough letters');return;}
  // Accept any 5-letter English word — no restriction on input
  // Only the answer words (WORDS array) are used for the weekly answer
  G.isProcessing=true;
  var res=guessResult(g);
  G.guesses.push(g);G.results.push(res);G.currentInput='';
  renderGrid();
  flipRow(ri,g,res,function(){
    updateKeys();renderGrid();G.isProcessing=false;
    if(res.every(function(r){return r==='correct';})){
      G.finished=true;G.won=true;clearInterval(G.timerInt);
      var tr=G.guesses.length;
      G.score=Math.max(10,(110-tr*10)+G.hintsLeft*4-Math.floor(G.timer/30));
      stats.played++;stats.wins++;stats.streak++;stats.maxStreak=Math.max(stats.maxStreak,stats.streak);stats.dist[tr-1]++;
      localStorage.setItem('wg4_stats',JSON.stringify(stats));
      var se=$('wgStreak');if(se)se.textContent=stats.streak;
      bounceRow(ri);
      setTimeout(function(){
        launchConfetti();
        showCasinoWin(tr);
      },700);
    } else if(G.guesses.length>=G.maxGuesses){
      G.finished=true;clearInterval(G.timerInt);
      stats.played++;stats.streak=0;localStorage.setItem('wg4_stats',JSON.stringify(stats));
      var se=$('wgStreak');if(se)se.textContent=0;
      setTimeout(function(){showMsg('💀 Game Over! The word was: <strong style="color:#f0f6ff;letter-spacing:.12em">'+G.word+'</strong>','over');},300);
    }
    var gc=$('wgGC');if(gc)gc.textContent=G.guesses.length+' / 6';
  });
}

window.casinoSubmit=function(){
  var nameEl=$('casinoName');
  var name=(nameEl?nameEl.value:'').trim();
  if(!name){if(nameEl)nameEl.focus();return;}
  var btn=$('casinoSubBtn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  saveLB(name,function(ok){
    if(ok){
      var ov=$('wgCasino');if(ov)ov.remove();
      toast('Score submitted! 🏆',2200);
      setTimeout(loadLB,1400);
    } else {
      if(btn){btn.disabled=false;btn.textContent='🏅 Submit';}
      toast('Could not save. Try again.');
    }
  });
};

// ── HINT ──
window.wgHint=function(){
  if(G.finished)return;
  if(G.hintsLeft<=0){toast('No hints remaining');return;}
  var un=[];
  for(var i=0;i<G.wordLen;i++){
    var alreadyCorrect=false;
    G.results.forEach(function(r){if(r&&r[i]==='correct')alreadyCorrect=true;});
    if(!alreadyCorrect&&G.hintsUsed.indexOf(i)===-1)un.push(i);
  }
  if(!un.length){toast('All positions already known!');return;}
  var pos=un[Math.floor(Math.random()*un.length)];
  G.hintsUsed.push(pos);G.hintsLeft--;
  $('wgHintCard').style.display='block';
  renderHint();
  var hc=$('wgHC');if(hc)hc.textContent=G.hintsLeft;
  var hl=$('wgHL');if(hl)hl.textContent=G.hintsLeft;
  toast('Position '+(pos+1)+' is "'+G.word[pos]+'"');
};

// ── CHECK ──
window.wgCheck=function(){
  if(G.guesses.length===0){toast('Make a guess first!');return;}
  var res=guessResult(G.guesses[G.guesses.length-1]),cor=0,pre=0;
  res.forEach(function(r){if(r==='correct')cor++;else if(r==='present')pre++;});
  toast(cor+' correct · '+pre+' wrong position',2200);
};

// ── WEEKLY FIXED WORD ──
function getWeeklyWord(){
  var seed=0;
  for(var i=0;i<WEEK.length;i++)seed=(seed*31+WEEK.charCodeAt(i))>>>0;
  return WORDS[seed%WORDS.length];
}

// ── RESET ──
window.wgReset=function(){
  clearInterval(G.timerInt);
  G.word=getWeeklyWord();
  G.wordLen=5;G.maxGuesses=6;G.hintsLeft=2;G.hintsUsed=[];
  G.guesses=[];G.results=[];G.currentInput='';G.keyStates={};
  G.timer=0;G.finished=false;G.won=false;G.score=0;G.isProcessing=false;
  var m=$('wgMsg');if(m)m.className='wg-msg';
  var hc=$('wgHintCard');if(hc)hc.style.display='none';
  var ov=$('wgCasino');if(ov)ov.remove();
  buildGrid();buildKB();renderGrid();
  var te=$('wgTimer');if(te)te.textContent='00:00';
  G.timerInt=setInterval(function(){if(!G.finished){G.timer++;var te=$('wgTimer');if(te)te.textContent=ft(G.timer);}},1000);
};

// ── LEADERBOARD ──
function fetchLB(cb){
  fetch(SCRIPT_URL+'?week='+encodeURIComponent(WEEK))
    .then(function(r){return r.json();})
    .then(function(d){d.sort(function(a,b){return Number(a.time||99999)-Number(b.time||99999);});cb(d);})
    .catch(function(){cb([]);});
}
function saveLB(name,cb){
  fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({week:WEEK,name:name,tries:G.guesses.length,score:G.score,time:G.timer,hintsLeft:G.hintsLeft,timestamp:Date.now()})})
  .then(function(r){return r.json();}).then(function(d){cb(d.result==='ok');}).catch(function(){cb(false);});
}
function renderLB(scores){
  var el=$('wgLbList');if(!el)return;
  if(!scores.length){el.innerHTML='<div class="wg-lb-empty">No scores yet 🎯 Be the first!</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var html='<table class="wg-lb-table"><thead><tr><th>#</th><th>Player</th><th>Time</th><th>Hints Left</th><th>Date</th></tr></thead><tbody>';
  scores.slice(0,10).forEach(function(s,i){
    html+='<tr><td class="wg-rank">'+(medals[i]||'#'+(i+1))+'</td>'+
      '<td class="wg-plr">'+esc(s.name)+'</td>'+
      '<td class="wg-tv">'+ft(Number(s.time||0))+'</td>'+
      '<td class="wg-hv">'+(s.hintsLeft!==undefined?s.hintsLeft:'—')+'</td>'+
      '<td class="wg-dv">'+fd(s.timestamp)+'</td></tr>';
  });
  html+='</tbody></table>';el.innerHTML=html;
}
function loadLB(){fetchLB(renderLB);}

// ── KEYBOARD EVENTS ──
document.addEventListener('keydown',function(e){
  var tag=document.activeElement&&document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter'){e.preventDefault();handleKey('Enter');}
  else if(e.key==='Backspace'){e.preventDefault();handleKey('Backspace');}
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});
document.body.addEventListener('touchmove',function(e){
  // Only block scroll on the keyboard buttons themselves
  if(e.target.closest('.wg-key,.wg-kb-row'))e.preventDefault();
},{passive:false});

// ── START ──
wgReset();
toast('📅 This week\'s word — same for everyone!',2400);
loadLB();

})();
</script>
